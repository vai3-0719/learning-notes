name: Daily Learning Log

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Log today learning
        run: |
          echo "## Learning Log - $(date -u '+%Y-%m-%d')" >> log.md
          echo "- Reviewed new topics" >> log.md
          echo "" >> log.md
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "docs: daily learning log $(date -u '+%Y-%m-%d')" || true
          git push